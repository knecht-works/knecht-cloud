# The install smoke: run scripts/install.sh on a fresh Ubuntu 24.04 runner
# exactly the way a new user does (curl | bash, no checkout), then assert the
# full substrate: Docker, the pinned ddev CLI, the warmed ddev images, the app
# answering unconfigured, and a routerless ddev project booting with its web
# container reachable by IP (what every run and preview depends on).
#
# Runs on amd64 AND arm64 (the two supported host architectures). Note: the
# smoke installs with KNECHT_REF=<sha>, which pins the `latest` image, so the
# arm64 leg only passes once a stable release has published a multi-arch
# `latest` (true since v0.3.0); before that it fails at `docker compose pull`.
name: install

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      # The runner ships Docker preinstalled; a fresh VPS has none. Purge it so
      # the installer runs the real fresh-server path.
      - name: Remove the preinstalled Docker (simulate a fresh server)
        run: |
          sudo systemctl stop docker.socket docker 2>/dev/null || true
          sudo apt-get purge -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin docker-ce-rootless-extras 2>/dev/null || true
          sudo rm -rf /etc/docker /var/lib/docker
          # The runner image keeps a leftover 'packer' user on uid 1000; the
          # installer reserves that uid for 'knecht' (free on fresh servers).
          sudo userdel packer 2>/dev/null || true

      - name: Run the installer like a user would
        run: |
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/scripts/install.sh" \
            | sudo env KNECHT_DOMAIN=knecht.invalid KNECHT_REF="$GITHUB_SHA" bash

      - name: Assert the substrate
        run: |
          docker --version
          ddev --version | grep -F 1.25.2
          sudo docker image ls --format '{{.Repository}}' | grep -q 'ddev/ddev-webserver'
          echo "substrate ok"

      - name: Assert the app is up and awaiting setup
        run: |
          code=""
          for i in $(seq 1 60); do
            code=$(curl -s -o /tmp/status.json -w '%{http_code}' http://127.0.0.1:3000/api/_setup/status 2>/dev/null || true)
            [ "$code" = "200" ] && break
            sleep 2
          done
          if [ "$code" != "200" ]; then
            echo "::error::App never answered (last probe: HTTP=$code)"
            sudo docker compose --project-directory /opt/knecht logs --tail 100 knecht || true
            exit 1
          fi
          grep -q '"configured": *false' /tmp/status.json
          echo "app ok:" && head -c 200 /tmp/status.json && echo

      # The core question of the smoke: does a routerless ddev project boot on
      # this host, with its web container serving any Host header by IP (what
      # every run and preview depends on)?
      - name: Boot a routerless ddev project and reach its web container
        run: |
          sudo mkdir -p /tmp/spike/public
          echo '<?php echo "spike-ok";' | sudo tee /tmp/spike/public/index.php > /dev/null
          sudo chown -R knecht /tmp/spike
          cd /tmp/spike
          sudo runuser -u knecht -- env HOME=/home/knecht DDEV_NONINTERACTIVE=true ddev config --project-type=php --docroot=public --project-name=spike
          sudo runuser -u knecht -- env HOME=/home/knecht DDEV_NONINTERACTIVE=true ddev start -y
          IP=$(sudo docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{if $v.IPAddress}}{{$v.IPAddress}} {{end}}{{end}}' ddev-spike-web | awk '{print $1}')
          curl -fsS -m 10 -H 'Host: whatever.example.com' "http://$IP/" | grep -F spike-ok
          echo "web container ok at $IP"
          sudo runuser -u knecht -- env HOME=/home/knecht DDEV_NONINTERACTIVE=true ddev delete --omit-snapshot -y spike
