# Release pipeline. Push a tag and everything else follows:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Builds the prod image, pushes it to GHCR (the version tag + latest), and
# creates the GitHub Release. The Release matters beyond ceremony: the in-app
# updater polls releases/latest, which only sees actual Releases, not bare
# tags, and the dashboard renders each Release body as the changelog
# (server/utils/version.ts listReleases). The body is generated below as a
# plain commit-subject list since the previous release tag: this repo commits
# straight to main, so GitHub's --generate-notes (PR-based) would come up
# empty. Keep the body a plain "- subject" list; the dashboard renders it as
# text, not markdown. One-time setup: the ghcr.io package must be set to
# public visibility after the first push, or anonymous pulls on servers fail.
name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # gh release create
  packages: write   # ghcr.io push

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: the changelog step diffs against the previous
          # release tag.
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          platforms: linux/amd64
          push: true
          build-args: |
            KNECHT_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/knecht-works/knecht-cloud:${{ github.ref_name }}
            ghcr.io/knecht-works/knecht-cloud:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The changelog: every commit subject since the previous release tag
      # (whole history for the first release). Merge commits are noise, the
      # subjects are the signal.
      - name: Build release notes from commits
        run: |
          prev="$(git describe --tags --match 'v*.*.*' --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          git log ${prev:+$prev..}"$GITHUB_REF_NAME" --no-merges --pretty='- %s' > /tmp/notes.md
          echo "Notes ($prev -> $GITHUB_REF_NAME):" && cat /tmp/notes.md

      - run: gh release create "$GITHUB_REF_NAME" --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
