# Knecht: the control plane.
# Requires a Linux host with Docker and the ddev CLI (scripts/provision-host.sh):
# each run boots as a uniquely-named ddev project on the HOST daemon, driven by
# the ddev CLI inside this container through the mounted socket
# (server/daemon/sandbox.ts). No Docker-in-Docker, no special runtime.

services:
  knecht:
    # Production pulls the CI-built release image, pinned via KNECHT_VERSION in
    # .env (written by scripts/install.sh, advanced by the in-app updater).
    # Local dev ignores the registry and builds from source instead:
    # `npm run preview:docker` passes --build.
    image: ghcr.io/knecht-works/knecht-cloud:${KNECHT_VERSION:-latest}
    build:
      context: .
    # App env (OAuth creds, session password, …) passed INTO the container so the
    # app process sees them. (compose also reads .env for ${...} interpolation, but
    # that does NOT inject vars into the container; env_file does.) Host dev via
    # `npm run dev` reads .env natively.
    env_file:
      - .env
    # The session cookie's Domain attribute must be set at RUNTIME: the value
    # baked into the image at build (nuxt.config.ts) is empty because CI builds
    # without KNECHT_BASE_DOMAIN. Without it the cookie is host-only and the
    # login-gated preview subdomains never receive the session.
    environment:
      - NUXT_SESSION_COOKIE_DOMAIN=${KNECHT_BASE_DOMAIN:-}
    # Grant the host docker socket's group to the (non-root) container process at
    # RUNTIME, so the SAME prebuilt image works on any host, no rebuild when the
    # gid differs. Find it with:  stat -c '%g' /var/run/docker.sock
    #   A Linux host's `docker` group is usually 999.
    # Set DOCKER_GID in .env (local) or by the installer (e.g. into /data/knecht/.env).
    group_add:
      - "${DOCKER_GID:-999}"
    # The Knecht web UI (Nitro). Bound to localhost only: caddy (below) is the
    # public entry point in production, and local dev reaches it via
    # http://localhost:3000 either way (Lima forwards localhost ports).
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Drive the HOST daemon through its socket: that's how the per-run ddev
      # projects are launched (and the only reason this socket is here).
      - /var/run/docker.sock:/var/run/docker.sock
      # Fixed project path that MUST be byte-identical on both sides: the HOST
      # daemon resolves ddev's worktree bind mounts when a run's stack is
      # launched, so the worktree path Knecht passes has to exist on the host.
      # A single variable is used on both sides so they can never drift.
      # Production convention: /data/knecht/projects.
      - ${KNECHT_PROJECTS:-/data/knecht/projects}:${KNECHT_PROJECTS:-/data/knecht/projects}
      # Knecht's own state (SQLite DB, archives, dumps, the agent tools that
      # get bind-mounted into run web containers). Same-path convention as the
      # projects dir. Without this mount the DB lives in the container's
      # ephemeral filesystem and dies on every recreate.
      - ${KNECHT_DATA_DIR:-/data/knecht/data}:${KNECHT_DATA_DIR:-/data/knecht/data}
      # ddev's per-user state (global config + the registry of per-run
      # projects). Must survive recreates: name-based `ddev stop/delete` of
      # older runs' envs resolve against this registry.
      - ${KNECHT_DATA_DIR:-/data/knecht/data}/.ddev:/home/node/.ddev
    # The preview proxy reaches each run's web container over the
    # `knecht-ingress` docker network, which Knecht creates and joins at boot
    # (server/daemon/sandbox.ts). No host ingress ports are needed or
    # published here beyond the UI port above.
    restart: unless-stopped

  # TLS entry point (production only; the installer writes COMPOSE_PROFILES=prod
  # into .env, dev compose runs never start this). Terminates HTTPS for the
  # dashboard domain and fetches per-hostname certificates on demand for the
  # preview subdomains, gated by Knecht's /tls-ask endpoint (see Caddyfile).
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - KNECHT_BASE_DOMAIN=${KNECHT_BASE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # ACME account + issued certificates. Must persist, or every recreate
      # re-issues everything against Let's Encrypt rate limits.
      - caddy-data:/data
    restart: unless-stopped

volumes:
  caddy-data:
